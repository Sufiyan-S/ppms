services:
  postgres:
    image: postgres:16-alpine
    container_name: ppms-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - /home/ubuntu/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ppms-net

  backend:
    build:
      context: /home/ubuntu/ppms
      dockerfile: backend.Dockerfile
      args:
        APP_JAR: ppms-backend/target/ppms-backend-0.0.1-SNAPSHOT.jar
    container_name: ppms-backend
    restart: always
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
      MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
      LOGGING_FILE_NAME: /app/logs/application.log
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /home/ubuntu/ppms/logs/backend:/app/logs
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - ppms-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ppms-nginx
    restart: always
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    command: >
      /bin/sh -c "envsubst '$$DOMAIN_NAME' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/ppms/nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - /home/ubuntu/ppms/ppms-frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /home/ubuntu/ppms/logs/nginx:/var/log/nginx
    networks:
      - ppms-net

networks:
  ppms-net:
    name: ppms-net
