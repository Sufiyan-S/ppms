services:
  postgres:
    image: postgres:16
    container_name: ppms_postgres
    environment:
      POSTGRES_DB: ppms
      POSTGRES_USER: ppms_user
      POSTGRES_PASSWORD: ppms_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppms_user -d ppms"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
